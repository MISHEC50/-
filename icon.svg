<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#302b63"/>
  <!-- Book spine -->
  <rect x="130" y="96" width="48" height="322" rx="12" fill="#764ba2"/>
  <!-- Book cover -->
  <rect x="130" y="96" width="254" height="322" rx="12" fill="#f093fb"/>
  <!-- Book pages (right side) -->
  <rect x="178" y="96" width="206" height="322" rx="0 12 12 0" fill="#f5d0fa"/>
  <!-- Lines on page -->
  <rect x="200" y="148" width="160" height="10" rx="5" fill="#764ba2" opacity="0.35"/>
  <rect x="200" y="176" width="140" height="10" rx="5" fill="#764ba2" opacity="0.35"/>
  <rect x="200" y="204" width="150" height="10" rx="5" fill="#764ba2" opacity="0.35"/>
  <rect x="200" y="232" width="120" height="10" rx="5" fill="#764ba2" opacity="0.35"/>
  <rect x="200" y="260" width="155" height="10" rx="5" fill="#764ba2" opacity="0.35"/>
  <rect x="200" y="288" width="130" height="10" rx="5" fill="#764ba2" opacity="0.35"/>
  <rect x="200" y="316" width="145" height="10" rx="5" fill="#764ba2" opacity="0.35"/>
  <!-- Star on cover -->
  <text x="154" y="282" font-size="32" fill="white" opacity="0.8">⭐</text>
</svg>
